<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- 2x2 grid of white tiles -->
  <rect x="55" y="30" width="36" height="36" rx="8" fill="white"/>
  <rect x="101" y="30" width="36" height="36" rx="8" fill="white"/>
  <rect x="55" y="76" width="36" height="36" rx="8" fill="white"/>
  <rect x="101" y="76" width="36" height="36" rx="8" fill="white"/>
  <!-- "IC" label -->
  <text x="96" y="148" font-family="sans-serif" font-weight="700" font-size="22" fill="white" text-anchor="middle">IC</text>
</svg>
